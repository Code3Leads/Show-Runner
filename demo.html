<!DOCTYPE html>
<html>
<head>
  <title>Show Runner Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
      padding: 30px 15px;
    }

    h1 { margin-bottom: 5px; }
    p { color: #cbd5f5; }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
    }

    .phone {
      max-width: 320px;
      background: black;
      border-radius: 40px;
      padding: 10px;
    }

    .screen {
      background: #f1f5f9;
      border-radius: 30px;
      height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: white;
      color: black;
      padding: 10px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      margin: 5px 0;
      max-width: 75%;
    }

    .bot { background: #e5e7eb; color: black; }
    .user { background: #2563eb; color: white; margin-left: auto; }

    .input-area {
      background: white;
      padding: 10px;
    }

    input {
      width: 65%;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: #e11d48;
      color: white;
      cursor: pointer;
    }

    .options button {
      display: block;
      width: 100%;
      margin-top: 5px;
      background: #1f2937;
    }

    .phone-input {
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .phone-input input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .panel {
      max-width: 320px;
      background: #020617;
      border-radius: 20px;
      padding: 20px;
      text-align: left;
    }

    .lead {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<h1>Live Demo</h1>
<p>See both sides of the system in action</p>

<div class="container">

  <div class="phone">
    <div class="screen">

      <!-- 🔥 PHONE INPUT MOVED INSIDE -->
      <div class="phone-input">
        <input id="userPhone" placeholder="Enter your phone for demo">
      </div>

      <div class="header">Customer</div>

      <div class="messages" id="chat"></div>

      <div class="input-area">
        <input id="input" placeholder="Type message...">
        <button onclick="send()">Send</button>

        <div class="options" id="options">
          <button onclick="choose(1)">1. Emergency</button>
          <button onclick="choose(2)">2. Service Issue</button>
          <button onclick="choose(3)">3. Quote</button>
        </div>
      </div>

    </div>
  </div>

  <div class="panel">
    <h3>📲 New Lead Notification</h3>
    <div class="lead" id="leadBox">
      <span id="leadText"></span>
    </div>
  </div>

</div>

<script>

let step = 0;
let selectedText = "";
let priority = "";

window.onload = () => {
  bot("📞 Incoming Call...");
  setTimeout(() => bot("❌ Missed Call"), 1000);
  setTimeout(() => {
    bot("Hey! Sorry we missed your call.\n\nWhat can we help you with?");
  }, 2000);
};

function bot(text){
  let m = document.createElement("div");
  m.className = "bubble bot";
  m.innerText = text;
  chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;
}

function user(text){
  let m = document.createElement("div");
  m.className = "bubble user";
  m.innerText = text;
  chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;
}

function choose(option){

  if(option == 1){
    selectedText = "Emergency Service";
    priority = "🔥 HIGH PRIORITY";
  } else if(option == 2){
    selectedText = "Service Issue";
    priority = "⚠️ Normal Priority";
  } else {
    selectedText = "Quote Request";
    priority = "📋 Estimate Request";
  }

  user(selectedText);
  document.getElementById("options").style.display = "none";

  setTimeout(() => {
    bot("Tell us more details...");
    step = 1;
  }, 400);
}

function send(){
  let val = input.value.trim();
  if(!val) return;

  // 🔥 Allow typing 1/2/3
  if(step === 0){
    if(val === "1" || val === "2" || val === "3"){
      choose(parseInt(val));
      input.value = "";
      return;
    }
  }

  user(val);
  input.value = "";

  if(step === 1){

    let phoneInput = document.getElementById("userPhone").value;

    if (!phoneInput || phoneInput.length < 10) {
      alert("Enter a valid phone number first");
      return;
    }

    bot("⏳ Sending to contractor...");

    setTimeout(() => {

      document.getElementById("leadBox").style.display = "block";
      document.getElementById("leadText").innerHTML =
        selectedText + "<br>" + val;

      bot("✅ Contractor notified.");

      fetch("https://show-runner-backend.onrender.com/simulate-call", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "YOUR_API_KEY"
        },
        body: JSON.stringify({
          name: "Demo User",
          number: phoneInput,
          service: selectedText
        })
      });

    }, 800);
  }
}

</script>

</body>
</html>
