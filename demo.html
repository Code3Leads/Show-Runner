<!DOCTYPE html>
<html>
<head>
  <title>Missed Call Demo | Code 3 Leads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      text-align: center;
      padding: 30px 15px;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .phone {
      max-width: 350px;
      background: black;
      border-radius: 40px;
      padding: 12px;
    }

    .screen {
      background: #f1f5f9;
      border-radius: 30px;
      height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: white;
      color: black;
      padding: 10px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      margin: 5px 0;
      max-width: 75%;
    }

    .bot { background: #e5e7eb; color: black; }
    .user { background: #2563eb; color: white; margin-left: auto; }

    .input-area {
      background: white;
      padding: 10px;
    }

    input {
      width: 65%;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      background: #e11d48;
      color: white;
      cursor: pointer;
    }

    .options button {
      display: block;
      width: 100%;
      margin-top: 5px;
      background: #1f2937;
    }

    /* NEW CLEAN PHONE INPUT */
    .phone-input {
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .phone-input input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

  </style>
</head>

<body>

<h1>Live Demo</h1>
<p>See both sides of the system in action</p>

<div class="container">

  <div class="phone">
    <div class="screen">

      <!-- CLEAN PHONE INPUT -->
      <div class="phone-input">
        <input id="userPhone" placeholder="Enter your phone number">
      </div>

      <div class="header">Customer</div>

      <div class="messages" id="chat"></div>

      <div class="input-area">
        <input id="input" placeholder="Type message...">
        <button onclick="send()">Send</button>

        <div class="options" id="options">
          <button onclick="choose(1)">1. Emergency</button>
          <button onclick="choose(2)">2. Service Issue</button>
          <button onclick="choose(3)">3. Quote</button>
        </div>

      </div>
    </div>
  </div>

</div>

<script>

let step = 0;
let selectedText = "";

window.onload = () => {
  bot("📞 Incoming Call...");
  setTimeout(() => bot("❌ Missed Call"), 1000);
  setTimeout(() => {
    bot("Hey! Sorry we missed your call.\n\nWhat can we help you with?");
  }, 2000);
};

function bot(text){
  let m = document.createElement("div");
  m.className = "bubble bot";
  m.innerText = text;
  chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;
}

function user(text){
  let m = document.createElement("div");
  m.className = "bubble user";
  m.innerText = text;
  chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;
}

function choose(option){

  if(option == 1){
    selectedText = "Emergency Service";
  } 
  else if(option == 2){
    selectedText = "Service Issue";
  } 
  else {
    selectedText = "Quote Request";
  }

  user(selectedText);
  document.getElementById("options").style.display = "none";

  setTimeout(() => {
    bot("Tell us more...");
    step = 1;
  }, 400);
}

function send(){
  let val = input.value.trim();
  if(!val) return;

  // FIX: typing 1 works
  if(step === 0){
    if(val === "1" || val === "2" || val === "3"){
      choose(parseInt(val));
      input.value = "";
      return;
    }
  }

  user(val);
  input.value = "";

  if(step === 1){

    let phoneInput = document.getElementById("userPhone").value;

    if (!phoneInput || phoneInput.length < 10) {
      alert("Enter a valid phone number first");
      return;
    }

    bot("⏳ Sending to contractor...");

    // DEBUG LOG
    console.log("Sending to backend:", phoneInput);

    fetch("https://show-runner-backend.onrender.com/simulate-call", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "YOUR_REAL_API_KEY"
      },
      body: JSON.stringify({
        name: "Demo User",
        number: phoneInput,
        service: selectedText
      })
    })
    .then(res => res.json())
    .then(data => {
      console.log("Backend response:", data);
      bot("✅ Contractor notified.");
    })
    .catch(err => {
      console.error("ERROR:", err);
      bot("❌ Failed to send");
    });

  }
}

</script>

</body>
</html>
